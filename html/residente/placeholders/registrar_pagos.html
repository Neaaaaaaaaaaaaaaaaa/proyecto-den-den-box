<main class="container form-page">

  <h1>Registrar Pago</h1>
  <p>Completa la información del pago.</p>

  <div class="form-card">
        <form action="../../../programas/residente/subir_pago.php" method="POST" enctype="multipart/form-data">
      <label>Nombre Completo</label>
      <input type="text" name="nombre" placeholder="nombre" required class="login-input">

      <label>Fecha</label>
      <input type="date" name="fecha_pago" required class="login-input">

      <label>Valor</label>
      <input type="number" step="0.01" name="valor" placeholder="0.00" required class="login-input">

      <label>Método de Pago</label>
      <select name="metodo_pago" class="login-input" required>
        <option value="Efectivo">Efectivo</option>
        <option value="Transferencia">Transferencia</option>
        <option value="Tarjeta">Tarjeta</option>
        <option value="Otro">Otro</option>
      </select>

      <label>Estado del Pago</label>
      <select name="estado_pago" class="login-input" required>
        <option value="Pagado">Pagado</option>
        <option value="Pendiente">Pendiente</option>
      </select>

      <label>Descripción</label>
      <textarea name="descripcion" placeholder="Especificar la Descripcion..." required class="login-input mb-14 textarea-standard"></textarea>

      <label>Archivo</label>
          <p></p>
       <input type="file" name="archivo" class="input" required>
          <p></p>

      <button class="login-btn">
        Subir Pago
      </button>
    </form>
   </div>
