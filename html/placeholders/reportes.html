<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reportes — Den Den Box</title>
<link rel="shortcut icon" href="../../img/warzone.svg" type="image/x-icon">
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<header class="header">
  <div class="container navbar">
    <a class="brand" href="../index_admin.html">
      <img src="../../img/logo.png" alt="Logo">
      <div>
        <div class="title">Den Den Box</div>
        <div class="subtitle">Reportes</div>
      </div>
    </a>

    <nav class="nav-links">
      <a href="../index_admin.html">Inicio</a>
      <a href="../admin_dashboard.html">Dashboard admin</a>
      <a href="../crear.html">Crear usuario</a>
      <a href="../login.html" class="btn-login">Cerrar Sesión</a>
    </nav>
  </div>
</header>

<main class="container">

<h1>Reportes</h1>
<p>Filtra por fechas, genera el dashboard y exporta a PDF.</p>

<form action="../../programas/reporte_avanzado.php" method="GET" target="reporteFrame" class="report-form">
  <label>Tipo de reporte</label>
  <select name="tipo" class="login-input">
    <option value="consolidado">Consolidado</option>
    <option value="detallado">Detallado</option>
  </select>

  <label>Fecha inicio</label>
  <input type="date" name="inicio" class="login-input">

  <label>Fecha fin</label>
  <input type="date" name="fin" class="login-input">

  <button type="submit" class="login-btn">Generar reporte</button>
</form>

<div class="report-actions" style="margin-top:20px;">
  <a href="../../programas/exportar_pdf_avanzado.php" target="_blank" class="buttonplace">Exportar a PDF</a>
  <a href="../../programas/exportar_excel.php" target="_blank" class="buttonplace">Exportar a Excel</a>
</div>



<section style="margin-top:20px;">
  <h2>Vista previa del reporte</h2>
  <iframe id="reporteFrame" name="reporteFrame" src="../../programas/reporte_avanzado.php" style="width:100%;height:650px;border:1px solid #ddd;"></iframe>
</section>

<br>

<a href="../admin_dashboard.html" class="buttonplace">Volver</a>

</main>

<script>
  const form = document.querySelector('.report-form');
  const iframe = document.getElementById('reporteFrame');
  const exportPdfLink = document.querySelector('.report-actions a[href*="pdf"]');
  const exportExcelLink = document.querySelector('.report-actions a[href*="excel"]');

  function updateLinks(tipo, inicio, fin){
    let query = [];
    if (tipo) query.push('tipo='+encodeURIComponent(tipo));
    if (inicio) query.push('inicio='+encodeURIComponent(inicio));
    if (fin) query.push('fin='+encodeURIComponent(fin));
    const queryString = query.length ? '?' + query.join('&') : '';
    iframe.src = '../../programas/reporte_avanzado.php' + queryString;
    exportPdfLink.href = '../../programas/exportar_pdf_avanzado.php' + queryString;
    exportExcelLink.href = '../../programas/exportar_excel.php' + queryString;
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const tipo = this.tipo.value;
    const inicio = this.inicio.value;
    const fin = this.fin.value;
    updateLinks(tipo, inicio, fin);
  });

  // Inicializar con valores por defecto
  updateLinks('consolidado','','');
</script>

</body>
</html>
