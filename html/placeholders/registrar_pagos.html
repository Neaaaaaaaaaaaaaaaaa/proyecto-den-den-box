<main class="container" style="padding-top:28px;">

  <h1>Registrar Pago</h1>
  <p>Completa la información del pago.</p>

  <div style="margin-top:20px;max-width:600px;background:white;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.06);">
        <form action="../../programas/subir_pago.php" method="POST" enctype="multipart/form-data">
      <label>Nombre Completo</label>
      <input type="text" name="nombre" placeholder="nombre" required style="width:100%;padding:10px;border-radius:8px;border:1px solid #d0d5dd;margin-bottom:12px;">

      <label>Fecha</label>
      <input type="date" name="fecha_pago" required style="width:100%;padding:10px;border-radius:8px;border:1px solid #d0d5dd;margin-bottom:12px;">

      <label>Valor</label>
      <input type="number" step="0.01" name="valor" placeholder="0.00" required style="width:100%;padding:10px;border-radius:8px;border:1px solid #d0d5dd;margin-bottom:12px;">

      <label>Método de Pago</label>
      <select name="metodo_pago" style="width:100%;padding:10px;border-radius:8px;border:1px solid #d0d5dd;margin-bottom:12px;" required>
        <option value="Efectivo">Efectivo</option>
        <option value="Transferencia">Transferencia</option>
        <option value="Tarjeta">Tarjeta</option>
        <option value="Otro">Otro</option>
      </select>

      <label>Estado del Pago</label>
      <select name="estado_pago" style="width:100%;padding:10px;border-radius:8px;border:1px solid #d0d5dd;margin-bottom:12px;" required>
        <option value="Pagado">Pagado</option>
        <option value="Pendiente">Pendiente</option>
      </select>

      <label>Descripción</label>
      <textarea name="descripcion" placeholder="Especificar la Descripcion..." required style="width:100%;height:120px;padding:10px;border-radius:8px;border:1px solid #d0d5dd;margin-bottom:14px;resize: vertical;max-width: 100%;"></textarea>

      <label>Archivo</label>
          <p></p>
       <input type="file" name="archivo" class="input" required>
          <p></p>

      <button style="background:var(--primary);color:white;padding:10px 14px;border:none;border-radius:8px;font-weight:700;">
        Subir Pago
      </button>
    </form>
   </div>
