<main class="container admin-main">

<h1>Publicar Comunicación</h1>

<form action="../../programas/guardar_comunicacion.php" method="POST" enctype="multipart/form-data" class="admin-panel">

<input type="text" name="titulo" placeholder="Título" class="login-input" required>

<input type="text" name="tipo" placeholder="Tipo (Circular, Aviso...)" class="login-input" required>

<select name="estado" class="login-input">
	<option value="Activa">Activa</option>
	<option value="Vigente">Vigente</option>
	<option value="Prioritario">Prioritario</option>
	<option value="Inactiva">Inactiva</option>
</select>

<label>Destinatario</label>
<select name="destinatario" class="login-input" required>
	<option value="global">Comunicación Global (Todo el conjunto)</option>
	<option value="inmueble">Comunicación Específica (Un inmueble)</option>
</select>

<label>Torre (solo para comunicación específica)</label>
<select id="torre" class="login-input">
	<option value="">No seleccionar torre (comunicación global)</option>
</select>

<label>Apartamento (solo para comunicación específica)</label>
<select id="id_inmueble" name="id_inmueble" class="login-input">
	<option value="">No seleccionar apartamento (comunicación global)</option>
</select>

<p style="font-size:13px;color:#667085;margin:-2px 0 12px 0;">Se listan todos los apartamentos de la torre (ocupados y desocupados).</p>

<p style="margin-top:-6px; margin-bottom:12px; font-size:13px; color:#667085;">
	Si la comunicación es global, deja Torre y Apartamento vacíos.
</p>

<textarea name="contenido" placeholder="Contenido del comunicado" class="login-input" required></textarea>

<label>Archivo adjunto (opcional)</label>
<input type="file" name="archivo_comunicacion" class="login-input" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">

<button type="submit" class="login-btn">Publicar</button>

</form>

<a href="../../programas/listar_comunicaciones_admin.php" class="buttonplace">
Ver Comunicaciones
</a>
<br>

		<div>
				<a href="../admin_dashboard.html" class="buttonplace">Volver</a>
		</div>
</main>

<script>
	const destinatarioSelect = document.querySelector('select[name="destinatario"]');
	const torreSelect = document.getElementById("torre");
	const inmuebleSelect = document.getElementById("id_inmueble");

	function actualizarSelectsComunicacion() {
		const esEspecifica = destinatarioSelect.value === "inmueble";
		torreSelect.disabled = !esEspecifica;
		inmuebleSelect.disabled = !esEspecifica;
		if (!esEspecifica) {
			torreSelect.value = "";
			inmuebleSelect.innerHTML = '<option value="">No seleccionar apartamento (comunicación global)</option>';
		}
	}

	async function cargarTorres() {
		torreSelect.innerHTML = '<option value="">No seleccionar torre (comunicación global)</option>';
		try {
			const resp = await fetch("../../programas/documentos_torres.php");
			const data = await resp.json();
			(data.torres || []).forEach(t => {
				const op = document.createElement("option");
				op.value = t.nombre;
				op.textContent = t.nombre;
				torreSelect.appendChild(op);
			});
		} catch (_) {
			torreSelect.innerHTML = '<option value="">No se pudieron cargar torres</option>';
		}
	}

	async function cargarInmueblesPorTorre() {
		inmuebleSelect.innerHTML = '<option value="">Cargando apartamentos...</option>';
		const torre = torreSelect.value;
		try {
			if (!torre) {
				inmuebleSelect.innerHTML = '<option value="">No seleccionar apartamento (comunicación global)</option>';
				return;
			}

			const url = `../../programas/documentos_inmuebles.php?torre=${encodeURIComponent(torre)}`;
			const resp = await fetch(url);
			const data = await resp.json();
			inmuebleSelect.innerHTML = '<option value="">Seleccione apartamento</option>';
			(data.inmuebles || []).forEach(i => {
				const op = document.createElement("option");
				op.value = i.id_inmueble;
				op.textContent = `ID ${i.id_inmueble} - Torre ${i.torre} - Apto ${i.numero}`;
				inmuebleSelect.appendChild(op);
			});
		} catch (_) {
			inmuebleSelect.innerHTML = '<option value="">No se pudieron cargar apartamentos</option>';
		}
	}

	destinatarioSelect.addEventListener("change", actualizarSelectsComunicacion);
	torreSelect.addEventListener("change", cargarInmueblesPorTorre);

	(async () => {
		await cargarTorres();
		await cargarInmueblesPorTorre();
		actualizarSelectsComunicacion();
	})();
</script>

</body>
</html>
